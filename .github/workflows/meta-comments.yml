name: Meta data sync

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many recent days to scan, counting back from today"
        required: true
        default: "30"
        type: number
      max_comments:
        description: "Maximum number of new comments to collect across all platforms"
        required: true
        default: "500"
        type: number
      max_content_items:
        description: "Maximum number of posts/media/ads to scan across all platforms"
        required: true
        default: "100"
        type: number
      gemini_model:
        description: "Gemini model to use"
        required: false
        default: "gemini-3.1-flash-lite"
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest -v

      - name: Sync Meta data to Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
          GEMINI_MODEL: ${{ github.event.inputs.gemini_model || 'gemini-3.1-flash-lite' }}
          GEMINI_API_MODE: ${{ vars.GEMINI_API_MODE || 'generateContent' }}
          LOOKBACK_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_days || '30' }}
          MAX_COMMENTS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.max_comments || '500' }}
          MAX_CONTENT_ITEMS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.max_content_items || '100' }}
          COMMENTS_PER_EXISTING_POST_COVERAGE: ${{ vars.COMMENTS_PER_EXISTING_POST_COVERAGE || '5' }}
          MAX_RUNTIME_SECONDS: "900"
          GEMINI_BATCH_SIZE: "10"
          ANALYSIS_TEXT_CHARS: ${{ vars.ANALYSIS_TEXT_CHARS || '1200' }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES || '3' }}
          GEMINI_RETRY_BASE_SECONDS: ${{ vars.GEMINI_RETRY_BASE_SECONDS || '20' }}
          GEMINI_FALLBACK_ON_ERROR: ${{ vars.GEMINI_FALLBACK_ON_ERROR || 'false' }}
          GEMINI_FALLBACK_AFTER_QUOTA_ERROR: ${{ vars.GEMINI_FALLBACK_AFTER_QUOTA_ERROR || 'false' }}
          ANALYZE_WITH_GEMINI: "true"
          PYTHONUNBUFFERED: "1"
          TIMEZONE: Asia/Jerusalem
        run: python -u sync_meta_analysis.py
